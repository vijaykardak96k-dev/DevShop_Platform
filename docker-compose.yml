version: "3.8"

services:

  product-service:
    build: ./backend/product-service
    ports:
      - "4001:4001"
    container_name: product-service

  order-service:
    build: ./backend/order-service
    ports:
      - "4002:4002"
    container_name: order-service
    depends_on:
      - product-service

  user-service:
    build: ./backend/user-service
    ports:
      - "4003:4003"
    container_name: user-service

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    container_name: frontend
    depends_on:
      - product-service
      - order-service
      - user-service